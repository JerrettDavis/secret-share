# Keep dependency PRs grouped and delayed for at least 48 hours so newly published packages age before adoption.
version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/secret-share-client"
      - "/secret-share-mailer"
      - "/secret-share-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2

  - package-ecosystem: "docker"
    directories:
      - "/secret-share-client"
      - "/secret-share-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      docker-dependencies:
        patterns:
          - "*"
